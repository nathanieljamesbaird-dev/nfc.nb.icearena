<style>
    * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }

    body {
        background-color: #333;
    }

    .container {
        width: 450px;
        height: 1000px;
        margin-top: 10px;
        border-radius: 0.8em;
        background-color: #fff;
        position: relative;
    }

    .coverphoto {
        width: 100%;
        position: absolute;
        margin: 0 auto;
        left: 0;
        border-top-left-radius: 0.8em;

        width: 150px;

    .titlename {

    .icons {

        gap: 50px;
        left: 0;
        right: 0;
        margin: 0 auto;
        top: 400px;

    }

    .icons i {
        cursor: pointer;

    .carousel {
        width: 400px;
        border-radius: 1rem;
        overflow: hidden;
        position: absolute;
        left: 0;
        right: 0;
        margin: 0 auto;
        top: 480px;
        outline: 2px solid #3f3f3f;
        box-shadow: 0 0 1rem #333;
    }

    .carousel input {
        display: none;
    }

.slides {
  display: flex;
  transition: transform 0.5s ease-in-out;
}

.slide {
    min-width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
    object-position: center;
}

    .s1 { background: #3498db; }
    .s2 { background: #e74c3c; }
    .s3 { background: #2ecc71; }

    /* Slide movement */
#slide1:checked ~ .slides { transform: translateX(0%); }
#slide2:checked ~ .slides { transform: translateX(-100%); }
#slide3:checked ~ .slides { transform: translateX(-200%); }
#slide4:checked ~ .slides { transform: translateX(-300%); }
#slide5:checked ~ .slides { transform: translateX(-400%); }

.navigation {
    position: absolute;
    bottom: 15px;          /* distance from bottom of carousel */
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
}

.navigation label {
  width: 12px;
  height: 12px;
  background: black;
  border-radius: 50%;
  cursor: pointer;
  opacity: 0.6;
}

.navigation label:hover {
  opacity: 1;
}

.contact {
    position: absolute;
    top: 1000px;
    display: flex;
    flex-direction: column;
    width: 100%;
    justify-content: center;
    margin: 0 auto;
    left: 0;
    right: 0;
    gap: 30px;

}

.contact a {
    text-decoration: none;
    color: #3b3b3b;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 32px;
    width: 50%;
    background: #f1f1f1;
    align-self: center;
    text-align: center;
    border-radius: 2rem;
    box-shadow: 0 0 1rem #333;
    transition: all 0.3s ease-in-out;
}

.contact a:hover {

.title-showcase {

.card-display {
